services:
  portfolio:
    build:
      context: ./site
    container_name: lab12-portfolio
    ports:
      - "8080:80"
    restart: unless-stopped

  vikunja:
    image: vikunja/vikunja
    container_name: lab12-vikunja
    environment:
      VIKUNJA_SERVICE_PUBLICURL: http://localhost:3456/
      VIKUNJA_SERVICE_SECRET: lab12-local-secret-20232098
      VIKUNJA_DATABASE_HOST: postgres
      VIKUNJA_DATABASE_PASSWORD: vikunja_password
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_USER: vikunja
      VIKUNJA_DATABASE_DATABASE: vikunja
    ports:
      - "3456:3456"
    volumes:
      - ./files:/app/vikunja/files
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18
    container_name: lab12-postgres
    environment:
      POSTGRES_DB: vikunja
      POSTGRES_PASSWORD: vikunja_password
      POSTGRES_USER: vikunja
    volumes:
      - ./db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
